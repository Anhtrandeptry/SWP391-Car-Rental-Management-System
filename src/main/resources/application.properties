# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=car-rental-system

# ===============================
# DATASOURCE (MySQL) - TEAM FRIENDLY (ENV VARS)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/crms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# Hibernate 7 (Spring Boot 4) -> use MySQLDialect (MySQL8Dialect no longer exists)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SESSION
# ===============================
server.servlet.session.timeout=30m

# ===============================
# INTERNATIONALIZATION (optional)
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@carrentalsystem.com

# ===============================
# VIETQR PAYMENT CONFIGURATION
# ===============================
vietqr.bank-id=970415
vietqr.account-number=1234567890
vietqr.account-name=CAR RENTAL SYSTEM
vietqr.template=compact2

# ===============================
# TWILIO SMS CONFIGURATION
# ===============================
twilio.account-sid=your-account-sid
twilio.auth-token=your-auth-token
twilio.phone-number=+1234567890
