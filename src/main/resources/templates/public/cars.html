<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Car Listings</title>
    <style>
        * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    margin: 0;
    background: #f6f8fb;
    color: #111827;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
}

/* ================= HEADER ================= */
.page-header {
    padding: 1.5rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    font-size: 1.8rem;
    font-weight: 800;
    color: #10b981;
}

/* HEADER ACTIONS (login / profile) */
.header-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

/* LOGIN BUTTON (PUBLIC) */
.login-btn {
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    background: #10b981;
    color: #ffffff;
    font-size: 0.85rem;
    font-weight: 700;
    text-decoration: none;
    transition: background 0.15s ease, box-shadow 0.15s ease;
}

.login-btn:hover {
    background: #059669;
    box-shadow: 0 4px 10px rgba(16, 185, 129, 0.35);
}

/* ================= SEARCH WRAPPER ================= */
.search-wrapper {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 2rem;
    border-radius: 16px;
    margin-bottom: 2.5rem;
    color: #fff;
}

.search-wrapper h2 {
    margin: 0 0 1.2rem 0;
    font-size: 1.4rem;
}

/* SEARCH BOX */
.search-box {
    display: flex;
    gap: 0.75rem;
    background: #ffffff;
    padding: 0.75rem;
    border-radius: 14px;
    align-items: center;
}

.search-box input {
    flex: 1;
    padding: 0.85rem 1rem;
    border: none;
    outline: none;
    font-size: 0.95rem;
    border-radius: 10px;
    background: #f9fafb;
}

.search-box button {
    padding: 0.85rem 1.4rem;
    border: none;
    border-radius: 10px;
    background: #10b981;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
}

.search-box button:hover {
    background: #059669;
}

/* CLEAR SEARCH BUTTON */
.clear-btn {
    padding: 0.75rem 1.1rem;
    border-radius: 10px;
    background: #f3f4f6;
    color: #374151;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    border: 2px solid transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
}

.clear-btn:hover {
    background: #e5e7eb;
    border-color: #d1d5db;
}

/* ================= FILTER ================= */
.filter-box {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: -1.5rem;
    margin-bottom: 2.5rem;
    background: #ffffff;
    padding: 1.1rem;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}

.filter-box select,
.filter-box input[type="text"] {
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 2px solid #6b7280;
    font-size: 0.85rem;
    background: #ffffff;
    min-width: 140px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.filter-box select:hover,
.filter-box input[type="text"]:hover {
    border-color: #374151;
}

.filter-box select:focus,
.filter-box input[type="text"]:focus {
    outline: none;
    border-color: #10b981;
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25);
}

.filter-box button {
    padding: 0.75rem 1.4rem;
    border-radius: 10px;
    border: none;
    background: #10b981;
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
}

.filter-box button:hover {
    background: #059669;
}

/* FILTER ACTIONS */
.filter-actions {
    display: flex;
    align-items: center;
    gap: 0.6rem;
}

/* RESET FILTER BUTTON (FIXED) */
.reset-filter-btn {
    padding: 0.7rem 1.1rem;
    border-radius: 10px;
    background: #f9fafb;
    color: #6b7280;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    border: 2px dashed #d1d5db;
    transition: all 0.15s ease;
}

.reset-filter-btn:hover {
    background: #f3f4f6;
    color: #374151;
    border-color: #9ca3af;
}

/* ================= CAR LIST ================= */
.car-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
}

.car-item {
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.car-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
}

.car-item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.car-meta {
    padding: 1rem;
}

.car-meta h3 {
    margin: 0 0 0.4rem 0;
    font-size: 1rem;
}

.car-meta p {
    margin: 0.2rem 0;
    font-size: 0.85rem;
    color: #4b5563;
}

.car-price {
    margin-top: 0.6rem;
    font-size: 1rem;
    font-weight: 800;
    color: #111827;
}

.rating {
    margin-top: 0.3rem;
    font-size: 0.85rem;
}

    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <div class="logo">CRMS</div>

        <!-- LOGIN BUTTON -->
        <div class="header-actions">
            <a th:href="@{/auth/login}" class="login-btn">Đăng nhập</a>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
        <h2>Tìm xe tự lái</h2>

        <form th:action="@{/public/cars}" method="get" class="search-box">
            <input type="text"
                   name="name"
                   placeholder="Chọn địa điểm / tên xe"
                   th:value="${name}"/>

            <button type="submit">TÌM XE</button>
            <a th:href="@{/public/cars}" class="clear-btn">XÓA</a>
        </form>
    </div>

    <!-- FILTER -->
    <form th:action="@{/public/cars}" method="get" class="filter-box">

        <select name="seats">
            <option value="">Số chỗ</option>
            <option th:each="s : ${seatsList}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${s == seats}">
            </option>
        </select>

        <select name="brand">
            <option value="">Hãng xe</option>
            <option th:each="b : ${brands}"
                    th:value="${b}"
                    th:text="${b}"
                    th:selected="${b == brand}">
            </option>
        </select>

        <select name="carType">
            <option value="">Loại xe</option>
            <option th:each="t : ${carTypes}"
                    th:value="${t}"
                    th:text="${t}"
                    th:selected="${t == carType}">
            </option>
        </select>

        <select name="fuelType">
            <option value="">Nhiên liệu</option>
            <option th:each="f : ${fuelTypes}"
                    th:value="${f}"
                    th:text="${f}"
                    th:selected="${f == fuelType}">
            </option>
        </select>

        <input type="text"
               name="location"
               placeholder="Địa điểm"
               th:value="${location}"/>

        <div class="filter-actions">
            <button type="submit">LỌC</button>

            <!-- RESET FILTER -->
            <a th:href="@{/public/cars}" class="reset-filter-btn">
                XÓA LỌC
            </a>
        </div>
    </form>

    <!-- RESULT -->
    <div th:if="${cars.empty}">
        <p>Không tìm thấy xe.</p>
    </div>

    <div class="car-list" th:if="${!cars.empty}">
        <div class="car-item" th:each="car : ${cars}">
            <a th:href="@{/public/cars/{id}(id=${car.id})}" class="car-link">

                <img th:if="${car.mainImageUrl != null}"
                     th:src="@{${car.mainImageUrl}}"/>

                <img th:unless="${car.mainImageUrl != null}"
                     src="/images/placeholder-car.png"/>

                <div class="car-meta">
                    <h3 th:text="${car.name}"></h3>
                    <p th:text="${car.brand} + ' - ' + ${car.model}"></p>
                    <p th:text="${car.location}"></p>

                    <p class="car-price"
                       th:text="${#numbers.formatDecimal(car.pricePerDay, 1, 'COMMA', 0, 'POINT')} + 'K/ngày'">
                    </p>

                    <p class="rating">
                        ⭐ <span th:text="${car.averageRating}"></span>
                    </p>
                </div>

            </a>
        </div>
    </div>

</div>

</body>
</html>
