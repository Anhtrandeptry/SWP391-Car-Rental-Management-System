<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar-owner(activePage)" class="crms-sidebar">
    <div class="nav-section">
        <div class="nav-title">Quan ly cho thue</div>
        <ul class="nav-list">
            <li class="nav-item"><a th:href="@{/owner/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''"><i class="bi bi-speedometer2"></i><span>Tong quan</span></a></li>
            <li class="nav-item"><a th:href="@{/owner/my-cars}" class="nav-link" th:classappend="${activePage == 'my-cars'} ? 'active' : ''"><i class="bi bi-car-front"></i><span>Xe cua toi</span></a></li>
            <li class="nav-item"><a th:href="@{/owner/income-estimate}" class="nav-link" th:classappend="${activePage == 'add-car'} ? 'active' : ''"><i class="bi bi-plus-circle"></i><span>Them xe moi</span></a></li>
            <li class="nav-item"><a th:href="@{/owner/car-availability}" class="nav-link" th:classappend="${activePage == 'availability'} ? 'active' : ''"><i class="bi bi-toggle-on"></i><span>Trang thai xe</span></a></li>
        </ul>
    </div>
    <div class="nav-section">
        <div class="nav-title">Don dat xe</div>
        <ul class="nav-list">
            <li class="nav-item"><a th:href="@{/owner/booking-history}" class="nav-link" th:classappend="${activePage == 'bookings'} ? 'active' : ''"><i class="bi bi-calendar-check"></i><span>Lich su dat xe</span></a></li>
            <li class="nav-item"><a th:href="@{/owner/handover-list}" class="nav-link" th:classappend="${activePage == 'handover'} ? 'active' : ''"><i class="bi bi-hand-index"></i><span>Ban giao xe</span></a></li>
            <li class="nav-item"><a th:href="@{/owner/return/list-car-return}" class="nav-link" th:classappend="${activePage == 'returns'} ? 'active' : ''"><i class="bi bi-arrow-return-left"></i><span>Tra xe</span></a></li>
        </ul>
    </div>
    <div class="nav-section">
        <div class="nav-title">Thu nhap</div>
        <ul class="nav-list">
            <li class="nav-item"><a th:href="@{/owner/income}" class="nav-link" th:classappend="${activePage == 'income'} ? 'active' : ''"><i class="bi bi-wallet2"></i><span>Thu nhap</span></a></li>
        </ul>
    </div>
    <div class="nav-section">
        <div class="nav-title">Tai khoan</div>
        <ul class="nav-list">
            <li class="nav-item"><a th:href="@{/profile}" class="nav-link" th:classappend="${activePage == 'profile'} ? 'active' : ''"><i class="bi bi-person"></i><span>Ho so ca nhan</span></a></li>
            <li class="nav-item"><a th:href="@{/profile/change-password}" class="nav-link" th:classappend="${activePage == 'password'} ? 'active' : ''"><i class="bi bi-key"></i><span>Doi mat khau</span></a></li>
        </ul>
    </div>
    <div class="logout-section">
        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="logout-btn"><i class="bi bi-box-arrow-right"></i> Dang xuat</button>
        </form>
    </div>
</aside>
</body>
</html>
