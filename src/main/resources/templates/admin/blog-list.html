<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Blogs</title>
    <style>
        :root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--teal:#0f766e;--shadow:0 10px 30px rgba(15,23,42,.06)}
        *{box-sizing:border-box}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
        .wrap{max-width:1100px;margin:0 auto;padding:22px 18px 40px}
        .top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border:1px solid rgba(15,118,110,.12);border-radius:16px;background:#fff;box-shadow:var(--shadow)}
        h1{margin:0;font-size:18px;font-weight:950}
        .btn{display:inline-flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid rgba(15,118,110,.15);background:rgba(15,118,110,.06);color:var(--teal);font-weight:900;text-decoration:none}
        .btn.primary{background:linear-gradient(135deg,#14b8a6,#0f766e);color:#fff;border-color:transparent}
        .table{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px 12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left}
        th{background:#f8fafc;color:#334155;font-weight:950}
        .badge{padding:5px 10px;border-radius:999px;font-weight:900;font-size:12px;display:inline-block}
        .pub{background:#ecfdf5;color:#16a34a;border:1px solid #bbf7d0}
        .draft{background:#fff7ed;color:#b45309;border:1px solid #fed7aa}
        .acts{display:flex;gap:8px;flex-wrap:wrap}
        .link{color:#1e88e5;font-weight:900;text-decoration:none}
        .link:hover{text-decoration:underline}
        .danger{color:#ef4444}
        form{margin:0}
        .empty{padding:16px;color:var(--muted);font-weight:900}
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <h1>Blog Management</h1>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
            <a class="btn" th:href="@{/public/blogs}" target="_blank">Xem blog public</a>
            <a class="btn primary" th:href="@{/admin/blogs/new}">+ Tạo blog mới</a>
        </div>
    </div>

    <div class="table">
        <table th:if="${blogs != null and !#lists.isEmpty(blogs)}">
            <thead>
            <tr>
                <th>Title</th>
                <th>Slug</th>
                <th>Status</th>
                <th>Created At</th>
                <th style="width:220px">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${blogs}">
                <td th:text="${b.title}">title</td>
                <td th:text="${b.slug}">slug</td>
                <td>
                    <span class="badge pub" th:if="${b.status != null and b.status.name() == 'PUBLISHED'}">PUBLISHED</span>
                    <span class="badge draft" th:if="${b.status == null or b.status.name() != 'PUBLISHED'}">DRAFT</span>
                </td>
                <td th:text="${b.createdAt}">time</td>
                <td>
                    <div class="acts">
                        <a class="link" th:href="@{|/admin/blogs/${b.id}/edit|}">Edit</a>
                        <a class="link" th:href="@{|/admin/blogs/${b.id}|}">View</a>
                        <form th:action="@{|/admin/blogs/${b.id}/delete|}" method="post"
                              onsubmit="return confirm('Delete this blog?');">
                            <button class="link danger" type="submit" style="background:none;border:none;cursor:pointer;padding:0">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${blogs == null or #lists.isEmpty(blogs)}">
            Chưa có blog nào.
        </div>
    </div>
</div>
</body>
</html>
