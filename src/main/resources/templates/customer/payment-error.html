<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi Thanh Toán - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .error-container h2 {
            color: #dc3545;
            margin: 20px 0;
            font-weight: 700;
            font-size: 32px;
        }
        .error-container p {
            color: #666;
            margin: 15px 0;
            font-size: 16px;
        }
        .error-details {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #721c24;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-retry {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
            text-decoration: none;
            color: white;
        }
        .btn-home {
            flex: 1;
            padding: 14px;
            background: #e9ecef;
            color: #555;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-home:hover {
            background: #ddd;
            color: #333;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">❌</div>
    <h2>Thanh Toán Thất Bại</h2>
    <p>Rất tiếc, quá trình thanh toán không thành công.</p>

    <div class="error-details" th:if="${error}">
        <strong>Lý do:</strong><br>
        <span th:text="${error}">-</span>
    </div>

    <p>Vui lòng kiểm tra thông tin thanh toán và thử lại.</p>
    <p style="color: #999; font-size: 14px;">
        Nếu vấn đề vẫn tiếp tục, vui lòng liên hệ với bộ phận hỗ trợ.
    </p>

    <div class="button-group">
        <a href="/customer/booking" class="btn-retry">🔄 Thử Lại</a>
        <a href="/" class="btn-home">🏠 Trang Chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
