<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Đơn Thuê - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .details-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: 600;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: 600;
            color: #555;
        }
        .detail-value {
            color: #333;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-payment_pending { background: #e2e3e5; color: #383d41; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .section-title {
            color: #667eea;
            font-weight: 700;
            margin: 20px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-back:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="details-container">
        <div class="card">
            <div class="card-header py-3">
                <h4 class="mb-0"><i class="bi bi-receipt"></i> Chi Tiết Đơn Thuê #<span th:text="${booking.bookingId}"></span></h4>
            </div>
            <div class="card-body">
                <!-- Status -->
                <div class="text-center mb-4">
                    <span th:class="'status-badge status-' + ${booking.status.toLowerCase()}" th:text="${booking.status}"></span>
                    <span th:class="'status-badge ms-2'"
                          th:classappend="${booking.paymentStatus == 'PAID' ? 'bg-success text-white' : 'bg-warning'}"
                          th:text="${booking.paymentStatus}"></span>
                </div>

                <!-- Car Information -->
                <h5 class="section-title"><i class="bi bi-car-front"></i> Thông Tin Xe</h5>
                <div class="detail-row">
                    <span class="detail-label">Tên xe:</span>
                    <span class="detail-value" th:text="${booking.carName}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Hãng / Dòng xe:</span>
                    <span class="detail-value" th:text="${booking.carBrand} + ' ' + ${booking.carModel}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Biển số:</span>
                    <span class="detail-value" th:text="${booking.licensePlate}"></span>
                </div>

                <!-- Rental Period -->
                <h5 class="section-title"><i class="bi bi-calendar-range"></i> Thời Gian Thuê</h5>
                <div class="detail-row">
                    <span class="detail-label">Ngày bắt đầu:</span>
                    <span class="detail-value" th:text="${#temporals.format(booking.startDate, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Ngày kết thúc:</span>
                    <span class="detail-value" th:text="${#temporals.format(booking.endDate, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Địa điểm nhận xe:</span>
                    <span class="detail-value" th:text="${booking.pickupLocation}"></span>
                </div>

                <!-- Fee Breakdown -->
                <h5 class="section-title"><i class="bi bi-cash-stack"></i> Chi Phí</h5>
                <div class="detail-row">
                    <span class="detail-label">Phí thuê xe:</span>
                    <span class="detail-value" th:text="${#numbers.formatDecimal(booking.rentalFee, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phí giữ chỗ:</span>
                    <span class="detail-value" th:text="${#numbers.formatDecimal(booking.holdingFee, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phí thế chấp:</span>
                    <span class="detail-value" th:text="${#numbers.formatDecimal(booking.depositAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                </div>
                <div class="detail-row" style="background: #f0f4ff; padding: 15px; border-radius: 8px; margin-top: 10px;">
                    <span class="detail-label" style="color: #667eea; font-size: 18px;">Tổng cộng:</span>
                    <span class="detail-value" style="color: #667eea; font-size: 18px; font-weight: 700;"
                          th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                </div>

                <!-- Owner Contact -->
                <h5 class="section-title"><i class="bi bi-person-circle"></i> Thông Tin Chủ Xe</h5>
                <div class="detail-row">
                    <span class="detail-label">Tên chủ xe:</span>
                    <span class="detail-value" th:text="${booking.ownerName}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Số điện thoại:</span>
                    <span class="detail-value">
                        <a th:href="'tel:' + ${booking.ownerPhone}" th:text="${booking.ownerPhone}"></a>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value">
                        <a th:href="'mailto:' + ${booking.ownerEmail}" th:text="${booking.ownerEmail}"></a>
                    </span>
                </div>

                <!-- Actions -->
                <div class="text-center mt-4 d-flex justify-content-center gap-3 flex-wrap">
                    <a href="/customer/booking-history" class="btn btn-back">
                        <i class="bi bi-arrow-left"></i> Quay Lại Danh Sách
                    </a>

                    <!-- Cancel Button -->
                    <form th:if="${canCancel}"
                          th:action="@{'/customer/booking/' + ${booking.bookingId} + '/cancel'}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Bạn có chắc muốn hủy đơn này?')">
                            <i class="bi bi-x-circle"></i> Hủy Đơn
                        </button>
                    </form>

                    <!-- Pay Button -->
                    <a th:if="${canPay}"
                       th:href="@{'/customer/booking/' + ${booking.bookingId} + '/payment'}"
                       class="btn btn-success">
                        <i class="bi bi-credit-card"></i> Thanh Toán
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
