<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách bàn giao | CRMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00a58e;
            --bg-body: #f4f7f6;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --white: #ffffff;
            /* Chỉnh màu viền đậm hơn để rõ nét */
            --border-color: #cbd5e1;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg-body);
            padding: 30px 20px; color: var(--text-main);
        }

        .container { max-width: 1000px; margin: 0 auto; }

        h2 { color: var(--primary-color); margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

        .table-card {
            background: var(--white); border-radius: var(--radius);
            /* Tăng độ dày viền lên 2px cho rõ nét */
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8fafb; padding: 15px 20px; text-align: left;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-sub);
            /* Viền dưới của header rõ nét hơn */
            border-bottom: 2px solid var(--border-color);
        }
        td {
            padding: 20px;
            /* Viền giữa các hàng rõ nét hơn */
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .booking-id { font-weight: 700; color: #1e293b; }
        .car-info strong { display: block; color: var(--text-main); }
        .car-info small { color: var(--text-sub); }

        /* Status Badge */
        .badge {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
        }
        .bg-success { background: #e6f6f4; color: var(--primary-color); }
        .bg-warning { background: #fff9f0; color: #d97706; }

        .btn-action {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--primary-color); color: white;
            text-decoration: none; padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .btn-action:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-exchange-alt"></i> Đơn hàng bàn giao xe</h2>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Thông tin xe</th>
                <th>Ngày thuê</th>
                <th>Trạng thái</th>
                <th style="text-align: right;">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}">
                <td class="booking-id" th:text="'#' + ${b.bookingId}">#1</td>
                <td class="car-info">
                    <strong th:text="${b.car.brand + ' ' + b.car.model}">Toyota Vios</strong>
                    <small th:text="${b.car.licensePlate}">29A-123.45</small>
                </td>
                <td th:text="${#temporals.format(b.startDate, 'dd/MM/yyyy')}">20/03/2026</td>
                <td>
                    <span th:if="${b.status.name() == 'ACCEPTED'}" class="badge bg-success">Đã Duyệt</span>
                    <span th:if="${b.status.name() == 'HANDOVER_PENDING'}" class="badge bg-warning">Đang Chờ Xác Nhận</span>
                </td>
                <td style="text-align: right;">
                    <a th:if="${b.status.name() == 'ACCEPTED'}"
                       th:href="@{/customer/handover/{id}(id=${b.bookingId})}"
                       class="btn-action">
                        <i class="fas fa-paper-plane"></i> Gửi yêu cầu
                    </a>

                    <span th:if="${b.status.name() == 'HANDOVER_PENDING'}"
                          class="btn-action btn-disabled">
                            <i class="fas fa-clock"></i> Chờ chủ xe...
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="5" style="text-align: center; padding: 50px; color: var(--text-sub);">
                    <i class="fas fa-folder-open fa-2x" style="display:block; margin-bottom:10px; opacity:0.5;"></i>
                    Không có đơn hàng nào cần bàn giao.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
