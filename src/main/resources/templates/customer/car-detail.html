<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${car.name}">Car Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
    --primary-color: #00a58e;
    --text-main: #2d3436;
    --text-sub: #636e72;
    --bg-body: #f4f7f6;
    --white: #ffffff;
    --radius: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-body);
    color: var(--text-main);
    padding-bottom: 50px;
}

.container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 20px;
}

.back-link { margin-bottom: 20px; }
.back-link a {
    text-decoration: none;
    color: var(--text-sub);
    font-size: 14px;
    transition: 0.3s;
}
.back-link a:hover { color: var(--primary-color); }

.content-wrapper {
    display: flex;
    gap: 30px;
}

.main-content { flex: 2; }
.sidebar { flex: 1; }

.car-gallery {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
}

.main-img img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    border-radius: var(--radius);
}

.sub-imgs {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
}

.sub-imgs img {
    width: 100%;
    height: 194px;
    object-fit: cover;
    border-radius: var(--radius);
}

.car-header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
}

.location {
    color: var(--text-sub);
    font-size: 15px;
    margin-bottom: 25px;
}

.specs-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 25px;
}

.spec-item {
    background: var(--white);
    padding: 15px;
    border-radius: var(--radius);
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.spec-item i {
    color: var(--primary-color);
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
}

.spec-item .label {
    display: block;
    font-size: 12px;
    color: var(--text-sub);
}

.section-card {
    background: var(--white);
    padding: 25px;
    border-radius: var(--radius);
    margin-bottom: 20px;
}

.section-card h3 {
    margin-bottom: 15px;
    font-size: 18px;
    border-left: 4px solid var(--primary-color);
    padding-left: 10px;
}

.desc-text {
    line-height: 1.8;
    color: #444;
}

.booking-card {
    background: var(--white);
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    position: sticky;
    top: 20px;
}

.price-header { margin-bottom: 20px; }
.price-val { font-size: 28px; font-weight: 800; color: var(--text-main); }
.price-unit { color: var(--text-sub); font-size: 14px; }

.booking-details {
    border-top: 1px solid #eee;
    padding-top: 20px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 15px;
}

.detail-row.total {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
    font-size: 18px;
}

.btn-booking {
display: block;
    width: 100%;
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s;
}

.btn-booking:hover {
    background: #008a77;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 165, 142, 0.3);
}

@media (max-width: 768px) {
    .content-wrapper { flex-direction: column; }
    .car-gallery { grid-template-columns: 1fr; }
    .sub-imgs { display: none; }
    .specs-grid { grid-template-columns: repeat(2, 1fr); }
}
    </style>
</head>
<body>

<div class="container">
    <div class="back-link">
        <a href="/customer/cars"><i class="fas fa-arrow-left"></i> Quay lại danh sách xe</a>
    </div>

    <div class="content-wrapper">
        <div class="main-content">

            <div class="car-gallery">
                <div class="main-img">
                    <img th:if="${not #lists.isEmpty(car.images)}" th:src="@{${car.images[0].imageUrl}}" alt="Main Car">
                </div>
                <div class="sub-imgs">
                    <div class="sub-img-item" th:each="img, iter : ${car.images}" th:if="${iter.index > 0 and iter.index < 3}">
                        <img th:src="@{${img.imageUrl}}" alt="Sub Car">
                    </div>
                </div>
            </div>

            <div class="car-header">
                <h1 th:text="${car.name}">Tên Xe</h1>
                <p class="location"><i class="fas fa-map-marker-alt"></i> <span th:text="${car.location}">Địa điểm</span></p>
            </div>

            <div class="specs-grid">
                <div class="spec-item">
                    <i class="fas fa-users"></i>
                    <span class="label">Số chỗ</span>
                    <strong th:text="${car.seats} + ' chỗ'">7 chỗ</strong>
                </div>
                <div class="spec-item">
                    <i class="fas fa-car"></i>
                    <span class="label">Truyền động</span>
                    <strong th:text="${car.carType}">Tự động</strong>
                </div>
                <div class="spec-item">
                    <i class="fas fa-gas-pump"></i>
                    <span class="label">Nhiên liệu</span>
                    <strong th:text="${car.fuelType}">Xăng</strong>
                </div>
                <div class="spec-item">
                    <i class="fas fa-leaf"></i>
                    <span class="label">Tiêu hao</span>
                    <strong th:text="${car.fuelConsumption}">7L/100km</strong>
                </div>
            </div>

            <div class="section-card">
                <h3>Mô tả</h3>
                <p class="desc-text" th:text="${car.description}">Mô tả chi tiết về xe...</p>
            </div>
        </div>

        <div class="sidebar">
            <div class="booking-card">
                <div class="price-header">
                    <span class="price-val" th:text="${#numbers.formatDecimal(car.pricePerDay, 1, 'COMMA', 0, 'POINT')} + 'K'">830K</span>
                    <span class="price-unit">/ngày</span>
                </div>

                <div class="booking-details">
                    <div class="detail-row">
                        <span>Đơn giá thuê</span>
                        <span th:text="${#numbers.formatDecimal(car.pricePerDay, 1, 'COMMA', 0, 'POINT')} + 'K'">830K</span>
                    </div>
                    <div class="detail-row total">
                        <span>Tổng cộng</span>
                        <strong th:text="${#numbers.formatDecimal(car.pricePerDay, 1, 'COMMA', 0, 'POINT')} + 'K'">830K</strong>
                    </div>
                </div>

                <a th:href="@{/customer/booking}" class="btn-booking">Đặt xe ngay</a>            </div>
        </div>
    </div>
</div>

</body>
</html>
