<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Khách Hàng - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-payment_pending { background: #e2e3e5; color: #383d41; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .table th { border-top: none; }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🚗 Car Rental System</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/customer/booking">
                    <i class="bi bi-plus-circle"></i> Đặt Xe Mới
                </a>
                <form action="/auth/logout" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                        <i class="bi bi-box-arrow-right"></i> Đăng Xuất
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Quick Actions -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="bi bi-car-front text-primary" style="font-size: 40px;"></i>
                    <h5 class="mt-3">Đặt Xe Mới</h5>
                    <p class="text-muted">Thuê xe cho chuyến đi của bạn</p>
                    <a href="/customer/booking" class="btn btn-primary">Đặt Ngay</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="bi bi-clock-history text-info" style="font-size: 40px;"></i>
                    <h5 class="mt-3">Lịch Sử Thuê</h5>
                    <p class="text-muted" th:text="${rentalHistory != null ? rentalHistory.size() : 0} + ' đơn đặt xe'"></p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="bi bi-person-circle text-success" style="font-size: 40px;"></i>
                    <h5 class="mt-3">Hồ Sơ</h5>
                    <p class="text-muted">Cập nhật thông tin cá nhân</p>
                    <a href="/profile" class="btn btn-outline-primary">Xem Hồ Sơ</a>
                </div>
            </div>
        </div>

        <!-- Rental History -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-list-ul"></i> Lịch Sử Thuê Xe
            </div>
            <div class="card-body">
                <div th:if="${rentalHistory == null || rentalHistory.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-inbox text-muted" style="font-size: 50px;"></i>
                    <p class="text-muted mt-3">Bạn chưa có đơn đặt xe nào</p>
                    <a href="/customer/booking" class="btn btn-primary">Đặt Xe Ngay</a>
                </div>

                <div th:if="${rentalHistory != null && !rentalHistory.isEmpty()}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã Đơn</th>
                                <th>Xe</th>
                                <th>Ngày Nhận</th>
                                <th>Ngày Trả</th>
                                <th>Tổng Tiền</th>
                                <th>Trạng Thái</th>
                                <th>Chủ Xe</th>
                                <th>Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${rentalHistory}">
                                <td th:text="'#' + ${booking.bookingId}"></td>
                                <td>
                                    <strong th:text="${booking.carName}"></strong><br>
                                    <small class="text-muted" th:text="${booking.carBrand} + ' ' + ${booking.carModel}"></small>
                                </td>
                                <td th:text="${#temporals.format(booking.startDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${#temporals.format(booking.endDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                                <td>
                                    <span th:class="'status-badge status-' + ${booking.status.toLowerCase()}" th:text="${booking.status}"></span>
                                </td>
                                <td>
                                    <span th:text="${booking.ownerName}"></span><br>
                                    <small class="text-muted">
                                        <i class="bi bi-telephone"></i> <span th:text="${booking.ownerPhone}"></span>
                                    </small>
                                </td>
                                <td>
                                    <!-- Cancel before payment -->
                                    <form th:if="${booking.status == 'PAYMENT_PENDING'}"
                                          th:action="@{/customer/booking/{id}/cancel(id=${booking.bookingId})}"
                                          method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc muốn hủy đơn này?')">
                                            <i class="bi bi-x-circle"></i> Hủy
                                        </button>
                                    </form>

                                    <!-- Go to payment -->
                                    <a th:if="${booking.status == 'PAYMENT_PENDING'}"
                                       th:href="@{/customer/booking/{id}/payment(id=${booking.bookingId})}"
                                       class="btn btn-sm btn-primary">
                                        <i class="bi bi-credit-card"></i> Thanh Toán
                                    </a>

                                    <!-- Cancel after payment -->
                                    <form th:if="${booking.status == 'CONFIRMED'}"
                                          th:action="@{/customer/booking/{id}/cancel-paid(id=${booking.bookingId})}"
                                          method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-warning"
                                                onclick="return confirm('Hủy đơn này sẽ không được hoàn lại phí giữ chỗ. Tiếp tục?')">
                                            <i class="bi bi-x-circle"></i> Hủy Đơn
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
