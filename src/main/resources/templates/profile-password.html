<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Đổi Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#f5f7fb; }
        .wrap { max-width: 700px; margin: 20px auto; }
        .cardx { background:#fff; border:1px solid #eee; border-radius:10px; padding:18px; }
    </style>
</head>
<body>

<div class="wrap cardx">
    <h4 class="fw-bold mb-3">Đổi Mật Khẩu</h4>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/profile/change-password}" th:object="${form}">
        <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
            Vui lòng kiểm tra lại các trường bị lỗi bên dưới.
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu hiện tại <span class="text-danger">*</span></label>
            <input type="password" class="form-control"
                   th:field="*{currentPassword}"
                   th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('currentPassword')}"
                 th:errors="*{currentPassword}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" class="form-control"
                   th:field="*{newPassword}"
                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('newPassword')}"
                 th:errors="*{newPassword}"></div>

            <div class="form-text">
                Gợi ý: tối thiểu 8 ký tự, nên gồm chữ và số.
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" class="form-control"
                   th:field="*{confirmPassword}"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('confirmPassword')}"
                 th:errors="*{confirmPassword}"></div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-secondary px-4" type="button" onclick="history.back()">
                <i class="bi bi-arrow-left"></i> Trở về
            </button>
            <button class="btn btn-primary px-4" type="submit">Đổi mật khẩu</button>
            <a class="btn btn-outline-secondary px-4" href="/profile">Hủy</a>
        </div>
    </form>
</div>

</body>
</html>
