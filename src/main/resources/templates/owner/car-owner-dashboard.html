<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ Xe - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-payment_pending { background: #e2e3e5; color: #383d41; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .car-status-available { background: #d4edda; color: #155724; }
        .car-status-reserved { background: #fff3cd; color: #856404; }
        .car-status-booked { background: #cce5ff; color: #004085; }
        .car-status-unavailable { background: #e2e3e5; color: #383d41; }
        .table th { border-top: none; }
        .alert { border-radius: 10px; }
        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .nav-pills .nav-link {
            color: #f5576c;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🚗 Car Rental - Chủ Xe</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/owner/income">
                    <i class="bi bi-graph-up"></i> Quản Lý Thu Nhập
                </a>
                <form action="/auth/logout" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                        <i class="bi bi-box-arrow-right"></i> Đăng Xuất
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-pills mb-4" id="ownerTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="rentals-tab" data-bs-toggle="pill"
                        data-bs-target="#rentals" type="button" role="tab">
                    <i class="bi bi-list-ul"></i> Lịch Sử Cho Thuê
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="cars-tab" data-bs-toggle="pill"
                        data-bs-target="#cars" type="button" role="tab">
                    <i class="bi bi-car-front"></i> Quản Lý Xe
                </button>
            </li>
        </ul>

        <div class="tab-content" id="ownerTabsContent">
            <!-- Rental History Tab -->
            <div class="tab-pane fade show active" id="rentals" role="tabpanel">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-calendar-check"></i> Lịch Sử Cho Thuê
                    </div>
                    <div class="card-body">
                        <div th:if="${rentalHistory == null || rentalHistory.isEmpty()}" class="text-center py-5">
                            <i class="bi bi-inbox text-muted" style="font-size: 50px;"></i>
                            <p class="text-muted mt-3">Chưa có đơn thuê xe nào</p>
                        </div>

                        <div th:if="${rentalHistory != null && !rentalHistory.isEmpty()}" class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Mã Đơn</th>
                                        <th>Xe</th>
                                        <th>Khách Hàng</th>
                                        <th>Ngày Nhận</th>
                                        <th>Ngày Trả</th>
                                        <th>Phí Thuê</th>
                                        <th>Trạng Thái</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="booking : ${rentalHistory}">
                                        <td th:text="'#' + ${booking.bookingId}"></td>
                                        <td>
                                            <strong th:text="${booking.carName}"></strong><br>
                                            <small class="text-muted" th:text="${booking.licensePlate}"></small>
                                        </td>
                                        <td>
                                            <span th:text="${booking.customerName}"></span><br>
                                            <small class="text-muted">
                                                <i class="bi bi-telephone"></i> <span th:text="${booking.customerPhone}"></span>
                                            </small>
                                        </td>
                                        <td th:text="${#temporals.format(booking.startDate, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td th:text="${#temporals.format(booking.endDate, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td th:text="${#numbers.formatDecimal(booking.rentalFee, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                                        <td>
                                            <span th:class="'status-badge status-' + ${booking.status.toLowerCase()}" th:text="${booking.status}"></span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cars Management Tab -->
            <div class="tab-pane fade" id="cars" role="tabpanel">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-car-front"></i> Danh Sách Xe Của Bạn
                    </div>
                    <div class="card-body">
                        <div th:if="${cars == null || cars.isEmpty()}" class="text-center py-5">
                            <i class="bi bi-car-front text-muted" style="font-size: 50px;"></i>
                            <p class="text-muted mt-3">Bạn chưa có xe nào</p>
                        </div>

                        <div th:if="${cars != null && !cars.isEmpty()}" class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Xe</th>
                                        <th>Biển Số</th>
                                        <th>Giá/Ngày</th>
                                        <th>Trạng Thái</th>
                                        <th>Thao Tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="car : ${cars}">
                                        <td>
                                            <strong th:text="${car.name}"></strong><br>
                                            <small class="text-muted" th:text="${car.brand} + ' ' + ${car.model}"></small>
                                        </td>
                                        <td th:text="${car.licensePlate}"></td>
                                        <td th:text="${#numbers.formatDecimal(car.pricePerDay, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                                        <td>
                                            <span th:class="'status-badge car-status-' + ${car.status.toLowerCase()}" th:text="${car.status}"></span>
                                        </td>
                                        <td>
                                            <!-- Set Available -->
                                            <form th:if="${car.status == 'UNAVAILABLE'}"
                                                  th:action="@{/owner/car/{id}/set-available(id=${car.carId})}"
                                                  method="post" style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-success">
                                                    <i class="bi bi-check-circle"></i> Mở Cho Thuê
                                                </button>
                                            </form>

                                            <!-- Set Unavailable -->
                                            <form th:if="${car.status == 'AVAILABLE'}"
                                                  th:action="@{/owner/car/{id}/set-unavailable(id=${car.carId})}"
                                                  method="post" style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-warning">
                                                    <i class="bi bi-pause-circle"></i> Tạm Dừng
                                                </button>
                                            </form>

                                            <!-- Booked - Cannot change -->
                                            <span th:if="${car.status == 'BOOKED' || car.status == 'RESERVED'}"
                                                  class="text-muted">
                                                <i class="bi bi-lock"></i> Đang có khách
                                            </span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
