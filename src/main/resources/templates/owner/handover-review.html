<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner - Duyệt bàn giao xe | CRMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00a58e;
            --primary-hover: #008a77;
            --danger-color: #e74c3c;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --bg-body: #f4f7f6;
            --white: #ffffff;
            /* Chỉnh màu viền đậm hơn để rõ nét */
            --border-color: #cbd5e1;
            --radius: 12px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 30px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .back-link {
            text-decoration: none; color: var(--text-sub);
            font-size: 14px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 25px; transition: 0.3s;
        }
        .back-link:hover { color: var(--primary-color); transform: translateX(-5px); }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            /* Tăng độ dày viền lên 2px cho rõ nét */
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 18px 25px;
            background: #f8fafb;
            /* Viền header đậm hơn */
            border-bottom: 2px solid var(--border-color);
            font-weight: 700;
            color: var(--text-main);
            display: flex; align-items: center; gap: 10px;
        }

        .card-body { padding: 25px; }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-block {
            background: #fcfdfe;
            /* Viền các ô thông tin đậm hơn */
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .info-block:hover {
            border-color: var(--primary-color);
            background: #f8fafc;
        }

        .info-block label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-block label i { color: #94a3b8; }

        .info-block span {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .note-block {
            background: #fffdf5;
            /* Viền ghi chú đậm hơn */
            border: 2px solid #fde68a;
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 10px;
        }
        .note-block label {
            font-size: 11px; font-weight: 700; color: #b45309;
            text-transform: uppercase; letter-spacing: 0.7px;
            display: block; margin-bottom: 7px;
        }
        .note-block p {
            margin: 0;
            font-style: italic;
            color: #78350f;
            font-size: 14px;
            line-height: 1.6;
        }

        .button-group { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-success { background: var(--primary-color); color: white; }
        .btn-success:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .btn-danger { background: white; color: var(--danger-color); border: 2px solid var(--danger-color); }
        .btn-danger:hover { background: #fff5f5; transform: translateY(-2px); }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .image-wrapper {
            border-radius: 10px; overflow: hidden;
            /* Viền khung ảnh đậm hơn */
            border: 2px solid var(--border-color);
            height: 250px; transition: 0.3s;
        }
        .image-wrapper:hover { border-color: var(--primary-color); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/owner/handover-list}" class="back-link">
        <i class="fas fa-arrow-left"></i> Quay lại danh sách chờ duyệt
    </a>

    <div class="main-layout">
        <div class="sidebar">
            <div class="card mb-4">
                <div class="card-header"><i class="fas fa-file-contract text-primary"></i> Chi tiết yêu cầu bàn giao</div>
                <div class="card-body">

                    <div class="info-group">
                        <div class="info-block">
                            <label><i class="fas fa-hashtag"></i> Mã đơn hàng</label>
                            <span th:text="'#' + ${handover.booking.bookingId}"></span>
                        </div>

                        <div class="info-block">
                            <label><i class="fas fa-gas-pump"></i> Mức nhiên liệu</label>
                            <span th:text="${handover.fuelLevel + '%'}"></span>
                        </div>

                        <div class="info-block">
                            <label><i class="fas fa-tachometer-alt"></i> Số Odometer</label>
                            <span th:text="${#numbers.formatDecimal(handover.odometerReading, 0, 'COMMA', 0, 'POINT')} + ' km'"></span>
                        </div>

                        <div class="note-block">
                            <label>Ghi chú từ khách</label>
                            <p th:text="${handover.description != null and handover.description != '' ? handover.description : 'Khách hàng không để lại ghi chú.'}"></p>
                        </div>
                    </div>

                    <div class="button-group">
                        <form th:action="@{/owner/approve}" method="post" onsubmit="return confirm('Xác nhận bắt đầu chuyến đi cho đơn hàng này?')">
                            <input type="hidden" name="bookingId" th:value="${handover.booking.bookingId}">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check-circle"></i> CHẤP NHẬN & BẮT ĐẦU
                            </button>
                        </form>

                        <form th:action="@{/owner/reject}" method="post" onsubmit="return confirm('Từ chối và yêu cầu khách hàng gửi lại ảnh?')">
                            <input type="hidden" name="bookingId" th:value="${handover.booking.bookingId}">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-undo"></i> TỪ CHỐI (GỬI LẠI)
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-images text-primary"></i> Hình ảnh xe khách vừa gửi
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(handover.images)}" class="text-center py-5">
                        <i class="fas fa-image fa-3x text-muted mb-3"></i>
                        <p class="text-muted">Không có hình ảnh đính kèm.</p>
                    </div>
                    <div class="image-grid">
                        <div th:each="img : ${handover.images}" class="image-wrapper">
                            <a th:href="${img.imageUrl}" target="_blank">
                                <img th:src="${img.imageUrl}" alt="Handover Proof">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
