<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Trạng Thái Xe - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .car-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .car-card:hover {
            transform: translateY(-3px);
        }
        .car-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        .car-plate {
            color: #666;
            font-size: 0.9rem;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-available { background: #d4edda; color: #155724; }
        .status-unavailable { background: #f8d7da; color: #721c24; }
        .status-reserved { background: #fff3cd; color: #856404; }
        .status-booked { background: #cce5ff; color: #004085; }
        .status-rented { background: #d1ecf1; color: #0c5460; }
        .status-pending { background: #e2e3e5; color: #383d41; }
        .btn-available {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-available:hover {
            background: linear-gradient(135deg, #218838, #0d6efd);
            color: white;
        }
        .btn-unavailable {
            background: linear-gradient(135deg, #dc3545, #c0392b);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-unavailable:hover {
            background: linear-gradient(135deg, #c82333, #a93226);
            color: white;
        }
        .btn-disabled {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: not-allowed;
        }
        .warning-text {
            color: #856404;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .empty-state i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-toggles"></i> Quản Lý Trạng Thái Xe</h2>
            <p class="mb-0">Bật/tắt trạng thái cho thuê của các xe</p>
        </div>
    </div>

    <div class="container">
        <!-- Back button -->
        <div class="mb-3">
            <a href="/owner/dashboard" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Quay lại Dashboard
            </a>
        </div>

        <!-- Alert messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Cars list -->
        <div th:if="${#lists.isEmpty(cars)}" class="empty-state">
            <i class="bi bi-car-front"></i>
            <h4>Chưa có xe nào</h4>
            <p>Hãy đăng ký xe đầu tiên của bạn!</p>
            <a href="/owner/create-car-step1" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Đăng ký xe mới
            </a>
        </div>

        <div class="row" th:if="${!#lists.isEmpty(cars)}">
            <div class="col-md-6 col-lg-4" th:each="car : ${cars}">
                <div class="car-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <div class="car-name" th:text="${car.name}"></div>
                            <div class="car-plate">
                                <i class="bi bi-credit-card-2-front"></i>
                                <span th:text="${car.licensePlate}"></span>
                            </div>
                        </div>
                        <span th:class="'status-badge status-' + ${car.status.toLowerCase()}"
                              th:text="${car.status}"></span>
                    </div>

                    <div class="mb-3">
                        <small class="text-muted">
                            <i class="bi bi-geo-alt"></i> <span th:text="${car.location}"></span>
                        </small>
                    </div>

                    <!-- Action buttons based on status -->
                    <div class="text-center">
                        <!-- If car has active booking (IN_USE), disable button -->
                        <div th:if="${car.hasActiveBooking}">
                            <button class="btn btn-disabled" disabled>
                                <i class="bi bi-lock"></i> Đang cho thuê
                            </button>
                            <p class="warning-text">
                                <i class="bi bi-info-circle"></i> Không thể thay đổi trạng thái khi xe đang được thuê
                            </p>
                        </div>

                        <!-- If AVAILABLE, show "Set Unavailable" button -->
                        <form th:if="${car.status == 'AVAILABLE' and !car.hasActiveBooking}"
                              th:action="@{'/owner/car/' + ${car.carId} + '/set-unavailable'}"
                              method="post">
                            <button type="submit" class="btn btn-unavailable"
                                    onclick="return confirm('Bạn có chắc muốn tạm dừng cho thuê xe này?')">
                                <i class="bi bi-pause-circle"></i> Tạm dừng cho thuê
                            </button>
                        </form>

                        <!-- If UNAVAILABLE, show "Set Available" button -->
                        <form th:if="${car.status == 'UNAVAILABLE' and !car.hasActiveBooking}"
                              th:action="@{'/owner/car/' + ${car.carId} + '/set-available'}"
                              method="post">
                            <button type="submit" class="btn btn-available">
                                <i class="bi bi-play-circle"></i> Mở cho thuê
                            </button>
                        </form>

                        <!-- If other status (RESERVED, BOOKED, PENDING, etc.), show info -->
                        <div th:if="${car.status != 'AVAILABLE' and car.status != 'UNAVAILABLE' and !car.hasActiveBooking}">
                            <button class="btn btn-disabled" disabled>
                                <i class="bi bi-hourglass-split"></i> <span th:text="${car.status}"></span>
                            </button>
                            <p class="warning-text">
                                <i class="bi bi-info-circle"></i> Xe đang ở trạng thái đặc biệt
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
