<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Cho Thuê - Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #0d6efd 0%, #3b82f6 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #0d6efd;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-payment_pending { background: #e2e3e5; color: #383d41; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .status-in_use { background: #d1ecf1; color: #0c5460; }
        .btn-action {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            margin: 2px;
        }
        .btn-view { background: #0d6efd; color: white; border: none; }
        .btn-view:hover { background: #0d7d73; color: white; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .empty-state i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-clock-history"></i> Lịch Sử Cho Thuê</h2>
            <p class="mb-0">Xem tất cả các đơn thuê xe của khách hàng</p>
        </div>
    </div>

    <div class="container">
        <!-- Back button -->
        <div class="mb-3">
            <a href="/owner/dashboard" class="btn btn-outline-success">
                <i class="bi bi-arrow-left"></i> Quay lại Dashboard
            </a>
        </div>

        <!-- Alert messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Booking history table -->
        <div class="table-container">
            <div th:if="${#lists.isEmpty(bookingHistory)}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <h4>Chưa có đơn thuê xe nào</h4>
                <p>Khi có khách đặt xe, đơn thuê sẽ hiển thị ở đây.</p>
            </div>

            <div th:if="${!#lists.isEmpty(bookingHistory)}">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Xe</th>
                                <th>Khách hàng</th>
                                <th>SĐT Khách</th>
                                <th>Ngày tạo</th>
                                <th>Ngày nhận xe</th>
                                <th>Ngày trả xe</th>
                                <th>Trạng thái</th>
                                <th>Thanh toán</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookingHistory}">
                                <td><strong th:text="'#' + ${booking.bookingId}"></strong></td>
                                <td>
                                    <span th:text="${booking.carName}"></span>
                                    <br>
                                    <small class="text-muted" th:text="${booking.licensePlate}"></small>
                                </td>
                                <td th:text="${booking.customerName}"></td>
                                <td>
                                    <a th:href="'tel:' + ${booking.customerPhone}" th:text="${booking.customerPhone}"></a>
                                </td>
                                <td th:text="${#temporals.format(booking.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${#temporals.format(booking.startDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${#temporals.format(booking.endDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span th:class="'status-badge status-' + ${booking.status.toLowerCase()}"
                                          th:text="${booking.status}"></span>
                                </td>
                                <td>
                                    <span th:class="'badge ' + (${booking.paymentStatus == 'PAID'} ? 'bg-success' : 'bg-warning')"
                                          th:text="${booking.paymentStatus}"></span>
                                </td>
                                <td>
                                    <!-- View Detail -->
                                    <a th:href="@{'/owner/booking/' + ${booking.bookingId}}"
                                       class="btn btn-action btn-view">
                                        <i class="bi bi-eye"></i> Chi tiết
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
